<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caregiver Panel | CogniScan</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0F172A;
            --card: rgba(30, 41, 59, 0.7);
            --primary: #1A6B72;
            --accent: #E07B6A;
            --success: #4CAF7D;
            --text: #F8FAFC;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            padding: 30px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-size: 24px; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }
        .logo span { color: #fff; }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 40px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
            width: 100%;
        }

        .card {
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 28px;
            padding: 30px;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .card-title { font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.4); margin-bottom: 24px; }

        .health-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
        
        .status-metric { text-align: center; padding: 20px; border-radius: 20px; background: rgba(0,0,0,0.2); }
        .metric-val { font-size: 48px; font-weight: 800; display: block; }
        .metric-label { font-size: 13px; font-weight: 700; opacity: 0.6; margin-top: 4px; }

        .alert-list { display: flex; flex-direction: column; gap: 15px; }
        .alert-item {
            padding: 16px 20px;
            border-radius: 20px;
            background: rgba(255,255,255,0.03);
            display: flex;
            align-items: center;
            gap: 15px;
            border-left: 4px solid var(--accent);
        }
        .alert-item.normal { border-left-color: var(--success); }

        .btn {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 14px 24px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(26,107,114,0.3); }

        .primary-contact {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
        }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 20px; }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate { animation: fadeIn 0.6s ease-out forwards; }

        @media (max-width: 900px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header>
        <div class="logo">Cogni<span>Scan</span> | CP</div>
        <div style="display:flex; align-items:center; gap:20px;">
            <span style="font-size:14px; font-weight:700; opacity:0.7;">Monitoring: <b>Robert</b></span>
            <div id="statusIndicator" style="width:12px; height:12px; background:var(--success); border-radius:50%; box-shadow: 0 0 10px var(--success);"></div>
        </div>
    </header>

    <div class="container">
        <div class="animate">
            <div class="card" style="margin-bottom:30px;">
                <p class="card-title">Cognitive Overview</p>
                <div class="health-grid">
                    <div class="status-metric">
                        <span class="metric-val" id="scoreVal">--</span>
                        <span class="metric-label">Latest Score</span>
                    </div>
                    <div class="status-metric">
                        <span class="metric-val" id="statusVal" style="font-size:24px; color:var(--success);">--</span>
                        <span class="metric-label">Risk Status</span>
                    </div>
                </div>
                
                <p class="card-title">Live Alert Feed</p>
                <div id="alertList" class="alert-list"></div>
            </div>
        </div>

        <div class="animate" style="animation-delay: 0.2s;">
            <div class="card" style="margin-bottom:30px;">
                <p class="card-title">Harsh Agarwal (Primary)</p>
                <div class="primary-contact">
                    <div class="avatar">HA</div>
                    <div>
                        <p style="font-weight:800; font-size:16px;">Harsh Agarwal</p>
                        <p style="font-size:13px; opacity:0.6;">+91 7304082775</p>
                    </div>
                </div>
                <button id="wellnessBtn" onclick="sendWellnessCheck()" class="btn" style="margin-top:20px; width:100%; justify-content:center;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                    Send Wellness-Check
                </button>
            </div>
            
            <!-- Toast notification container -->
            <div id="toast" style="display:none; position:fixed; bottom:40px; right:40px; padding:16px 24px; background:var(--success); color:#fff; border-radius:16px; font-weight:700; box-shadow:0 10px 30px rgba(0,0,0,0.5); z-index:999; animation:fadeIn 0.4s ease-out forwards;"></div>

            <div class="card">
                <p class="card-title">System Status</p>
                <div style="display:flex; flex-direction:column; gap:12px;">
                    <div style="display:flex; justify-content:space-between; font-size:14px;">
                        <span style="opacity:0.6;">SMS Gateway</span>
                        <span style="color:var(--success); font-weight:700;">ACTIVE</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; font-size:14px;">
                        <span style="opacity:0.6;">Gemini Analysis</span>
                        <span style="color:var(--success); font-weight:700;">STABLE</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; font-size:14px;">
                        <span style="opacity:0.6;">Facial AI</span>
                        <span style="color:var(--success); font-weight:700;">OK</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateSummary() {
            fetch('/api/caregiver-summary')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('scoreVal').innerText = data.latestScore;
                    const statusVal = document.getElementById('statusVal');
                    statusVal.innerText = data.latestStatus;
                    statusVal.style.color = (data.latestStatus === 'HIGH RISK') ? 'var(--accent)' : 'var(--success)';
                    
                    const list = document.getElementById('alertList');
                    list.innerHTML = '';
                    
                    if (!data.recentAlerts || !data.recentAlerts.length) {
                        list.innerHTML = '<p style="text-align:center; padding:20px; opacity:0.5;">No active alerts</p>';
                    } else {
                        data.recentAlerts.forEach(alert => {
                            const d = new Date(alert.timestamp);
                            const item = document.createElement('div');
                            item.className = 'alert-item';
                            item.innerHTML = `
                                <div style="flex:1;">
                                    <p style="font-weight:800; font-size:15px;">High Risk Triggered (Score: ${alert.score})</p>
                                    <p style="font-size:12px; opacity:0.6;">${d.toLocaleString()}</p>
                                </div>
                                <span style="font-size:11px; font-weight:900; background:rgba(224,123,106,0.15); color:var(--accent); padding:4px 10px; border-radius:8px;">SMS SENT</span>
                            `;
                            list.appendChild(item);
                        });
                    }
                });
        }

        function sendWellnessCheck() {
            const btn = document.getElementById('wellnessBtn');
            const originalContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="loading">Sending...</span>';
            
            fetch('/api/caregiver/wellness-check', { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    showToast('🚨 Wellness Check Request Sent!');
                    setTimeout(() => {
                        btn.disabled = false;
                        btn.innerHTML = originalContent;
                    }, 3000);
                })
                .catch(err => {
                    console.error(err);
                    showToast('❌ Error sending request');
                    btn.disabled = false;
                    btn.innerHTML = originalContent;
                });
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 5000);
        }

        updateSummary();
        setInterval(updateSummary, 4000); // Pulse every 4 seconds
    </script>
</body>
</html>
